name: Full Accessibility Audit
on: [push, pull_request]

jobs:
    audit:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'

            - name: Install Dependencies & Start App
              run: |
                  npm ci
                  ./node_modules/.bin/vite --host &

            - name: Run Full Accessibility Audit With Docker
              run: |
                  docker build -t full-accessibility-audit .

                  docker run --rm \
                    -e CYPRESS_BASE_URL="http://host.docker.internal:5173" \
                    --add-host=host.docker.internal:host-gateway \
                    -v ${{ github.workspace }}/reports:/app/cypress/fixtures \
                    full-accessibility-audit \
                    sh -c "npx wait-on http://host.docker.internal:5173 && npm run cy:run-crawler && npm run cy:run-audit"

            - name: Upload Report Artifacts
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: full-accessibility-fixtures
                  path: fixtures/
